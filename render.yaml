# render.yaml — Configuración de despliegue en Render

services:

  # ── BACKEND — FastAPI ──────────────────────────────────────
  - type: web
    name: crypto-analyst-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CLAUDE_API_KEY
        sync: false
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: CRYPTOPANIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RENDER
        value: "true"
    healthCheckPath: /api/health

  # ── FRONTEND — Static Site ─────────────────────────────────
  - type: web
    name: crypto-analyst-app
    runtime: static
    rootDir: frontend
    # Reemplaza __BACKEND_URL__ y __SUPABASE_URL__ con los valores reales
    # Cambia las URLs después del primer deploy del backend
    buildCommand: >
      sed -i 's|__BACKEND_URL__|https://crypto-analyst-api.onrender.com|g' index.html &&
      sed -i 's|__BACKEND_URL__|https://crypto-analyst-api.onrender.com|g' js/api.js &&
      sed -i 's|__SUPABASE_URL__|https://TUPROYECTO.supabase.co|g' index.html &&
      sed -i 's|__SUPABASE_URL__|https://TUPROYECTO.supabase.co|g' js/auth.js &&
      sed -i 's|__SUPABASE_ANON_KEY__|TU_ANON_KEY_AQUI|g' js/auth.js
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
